<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2a4564">
<title>隆泰帳篷 · 施工員</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f0ebe0;
  --bg-card: #fffdf7;
  --ink: #1a1614;
  --ink-soft: #5f564e;
  --ink-faint: #9b9389;
  --line: #d6ccbb;
  --line-soft: #e5dcc8;
  --worker: #2a4564;        /* 員工主色 - 深藍（與老闆端紅色區隔） */
  --worker-soft: #d5dde8;
  --worker-light: #e8eef5;
  --amber: #c08037;
  --amber-soft: #f7e4c9;
  --green: #4a6741;
  --green-soft: #dde5d3;
  --alert: #c73e1d;
  --shadow: 0 1px 2px rgba(26,22,20,0.04), 0 4px 12px rgba(26,22,20,0.06);
  --shadow-lg: 0 2px 6px rgba(26,22,20,0.06), 0 12px 28px rgba(26,22,20,0.1);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

body {
  background-image: 
    radial-gradient(at 0% 0%, rgba(42,69,100,0.04) 0%, transparent 50%),
    radial-gradient(at 100% 100%, rgba(192,128,55,0.04) 0%, transparent 50%);
  min-height: 100vh;
}

.app {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}

/* HEADER - 員工版跟老闆版不同 */
.header {
  padding: 18px 20px 16px;
  background: var(--worker);
  color: #fff;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 8px rgba(0,0,0,0.1);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.brand-mark {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.brand-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 2px 6px;
  border: 0.5px solid rgba(255,255,255,0.3);
  border-radius: 4px;
}

.user-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
}

.user-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #7ed598;
  box-shadow: 0 0 0 2px rgba(126,213,152,0.25);
}

.header-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.1em;
}

/* TAB NAV */
.tabs {
  display: flex;
  background: var(--bg-card);
  border-bottom: 0.5px solid var(--line);
  padding: 0;
  flex-shrink: 0;
  position: sticky;
  top: 73px;
  z-index: 9;
}

.tab {
  flex: 1;
  background: none;
  border: none;
  padding: 13px 4px;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  position: relative;
  font-weight: 500;
  transition: color 0.15s;
}

.tab-count {
  display: inline-block;
  background: var(--line);
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 4px;
  font-weight: 500;
}

.tab.active {
  color: var(--worker);
}

.tab.active .tab-count {
  background: var(--worker);
  color: #fff;
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -0.5px;
  left: 25%; right: 25%;
  height: 2.5px;
  background: var(--worker);
  border-radius: 2px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 18px 16px 80px;
}

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 500;
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}

.page-sub {
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 18px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* TODAY ALERT */
.today-alert {
  background: var(--amber-soft);
  border: 0.5px solid #e8c98a;
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 14px;
}

.today-alert-title {
  font-weight: 600;
  color: #7a5019;
  font-size: 14px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.today-alert-body {
  font-size: 12px;
  color: var(--ink-soft);
}

/* ORDER CARD */
.order-card {
  background: var(--bg-card);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
}

.order-card:active {
  transform: scale(0.99);
}

.order-card.urgent {
  border-left: 4px solid var(--alert);
}

.order-card.ongoing {
  border-left: 4px solid var(--amber);
}

.order-card.done {
  border-left: 4px solid var(--green);
  opacity: 0.88;
}

.order-card-top {
  padding: 14px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.order-card-client {
  font-family: 'Fraunces', serif;
  font-size: 19px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--ink);
}

.order-card-status {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}

.status-pending-setup { background: var(--amber-soft); color: #7a5019; }
.status-in-setup { background: var(--worker-soft); color: var(--worker); }
.status-pending-teardown { background: #f7e4d8; color: #9b4a1e; }
.status-done { background: var(--green-soft); color: #2a5240; }

.order-card-info {
  padding: 0 16px 10px;
  display: grid;
  gap: 6px;
}

.info-row {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 8px;
  font-size: 13px;
  align-items: start;
  line-height: 1.5;
}

.info-icon {
  color: var(--ink-faint);
  font-size: 13px;
  margin-top: 1px;
}

.info-text {
  color: var(--ink);
  word-break: break-word;
}

.info-text .label {
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 6px;
}

.info-text .phone-link {
  color: var(--worker);
  text-decoration: none;
  font-weight: 500;
}

.order-card-dates {
  padding: 10px 16px;
  background: #fbf7ec;
  border-top: 0.5px solid var(--line-soft);
  border-bottom: 0.5px solid var(--line-soft);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.date-chunk {
  text-align: center;
}

.date-chunk-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.date-chunk-value {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
}

.date-chunk-value.tomorrow { color: var(--alert); }
.date-chunk-value.today { color: var(--amber); }

.order-card-actions {
  padding: 12px 14px;
  display: flex;
  gap: 8px;
}

.action-btn {
  flex: 1;
  padding: 11px 12px;
  border-radius: 10px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.action-btn-main {
  background: var(--worker);
  color: #fff;
}
.action-btn-main:active { background: #1e3450; }

.action-btn-success {
  background: var(--green);
  color: #fff;
}
.action-btn-success:active { background: #3a5333; }

.action-btn-sec {
  background: var(--bg);
  color: var(--ink);
  border: 0.5px solid var(--line);
}

/* DETAIL VIEW */
.back-row {
  margin-bottom: 14px;
}

.back-btn {
  background: var(--bg-card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}

.detail-header {
  background: var(--bg-card);
  border-radius: 14px;
  padding: 18px 18px 16px;
  margin-bottom: 12px;
  border: 0.5px solid var(--line);
  box-shadow: var(--shadow);
}

.detail-client {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 500;
  line-height: 1.2;
  margin-bottom: 4px;
}

.detail-order-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}

.detail-section {
  background: var(--bg-card);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 12px;
  border: 0.5px solid var(--line);
}

.detail-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.detail-info-grid {
  display: grid;
  gap: 10px;
}

.detail-field {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 10px;
  font-size: 14px;
  align-items: baseline;
}

.detail-field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding-top: 2px;
}

.detail-field-value {
  color: var(--ink);
  font-weight: 500;
  line-height: 1.5;
}

.detail-field-value a {
  color: var(--worker);
  text-decoration: none;
}

/* Item list (no prices) */
.item-list {
  display: grid;
  gap: 10px;
}

.item-line {
  padding: 11px 12px;
  background: var(--worker-light);
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 3px solid var(--worker);
}

.item-line-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.item-line-qty {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  color: var(--worker);
  background: #fff;
  padding: 3px 12px;
  border-radius: 14px;
  min-width: 54px;
  text-align: center;
}

/* Remark for worker */
.worker-remark {
  background: #fffbf0;
  border: 0.5px solid #e8d98a;
  border-left: 3px solid #c0a030;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
}

/* PHOTO UPLOAD for this order */
.photo-upload-area {
  margin-top: 6px;
}

.photo-upload-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.photo-upload-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px dashed var(--line);
  background: var(--bg-card);
  font-family: inherit;
  font-size: 13px;
  color: var(--ink-soft);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  font-weight: 500;
}

.photo-upload-btn:active {
  background: var(--worker-light);
  border-color: var(--worker);
  color: var(--worker);
}

.photo-upload-btn.final {
  background: var(--green-soft);
  border: 1.5px solid var(--green);
  border-style: solid;
  color: var(--green);
  font-weight: 600;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 6px;
}

.photo-thumb {
  aspect-ratio: 1;
  background: linear-gradient(135deg, var(--line-soft), #c4b9a2);
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-thumb svg {
  width: 60%; height: 60%;
  opacity: 0.4;
}

.photo-thumb-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(255,255,255,0.95);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
}

.photo-thumb.is-final {
  border: 2.5px solid var(--green);
}

.photo-thumb.is-final::after {
  content: '✓ 完成';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--green);
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px;
  padding: 2px 4px;
  text-align: center;
  font-weight: 600;
}

.photo-note-editor {
  margin-top: 10px;
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
}

.photo-note-editor label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 6px;
}

.photo-note-editor textarea {
  width: 100%;
  min-height: 70px;
  padding: 10px 12px;
  border: 0.5px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
  background: var(--bg-card);
  resize: vertical;
  line-height: 1.55;
}

.photo-note-editor textarea:focus {
  outline: none;
  border-color: var(--worker);
  box-shadow: 0 0 0 3px rgba(42,69,100,0.1);
}

/* BIG ACTION (bottom) */
.big-action-container {
  margin: 18px 0 10px;
}

.big-action {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.1s;
}

.big-action:active { transform: scale(0.98); }

.big-action.primary {
  background: var(--worker);
  color: #fff;
  box-shadow: 0 4px 12px rgba(42,69,100,0.25);
}

.big-action.success {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 12px rgba(74,103,65,0.25);
}

.big-action.alert {
  background: var(--alert);
  color: #fff;
  box-shadow: 0 4px 12px rgba(199,62,29,0.25);
}

.big-action-hint {
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* MODAL */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,22,20,0.65);
  z-index: 100;
  padding: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: fadeIn 0.2s;
}

.modal-backdrop.visible {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: var(--bg-card);
  border-radius: 16px;
  max-width: 400px;
  width: 100%;
  padding: 24px 22px;
  box-shadow: var(--shadow-lg);
}

.modal-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--green-soft);
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  font-size: 26px;
}

.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 6px;
}

.modal-sub {
  text-align: center;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 18px;
}

.date-picker-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.date-picker-option {
  padding: 12px 8px;
  background: var(--bg);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  text-align: center;
  transition: all 0.1s;
}

.date-picker-option.selected {
  background: var(--worker);
  border-color: var(--worker);
  color: #fff;
}

.date-picker-option-day {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 500;
  display: block;
  margin-bottom: 2px;
}

.date-picker-option-week {
  font-size: 11px;
  opacity: 0.7;
}

.custom-date {
  width: 100%;
  padding: 12px;
  border: 0.5px solid var(--line);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 16px;
  background: var(--bg);
}

.modal-actions {
  display: flex;
  gap: 8px;
}

.modal-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.modal-btn-primary {
  background: var(--worker);
  color: #fff;
}

.modal-btn-sec {
  background: var(--bg);
  color: var(--ink);
  border: 0.5px solid var(--line);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  color: var(--line);
  margin-bottom: 12px;
  line-height: 1;
}

.empty-text {
  font-size: 14px;
  color: var(--ink-faint);
  margin-bottom: 6px;
}

.empty-sub {
  font-size: 12px;
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* HISTORY */
.history-item {
  background: var(--bg-card);
  border: 0.5px solid var(--line);
  border-left: 3px solid var(--green);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  cursor: pointer;
}

.history-item:active { transform: scale(0.99); }

.history-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
  gap: 10px;
}

.history-client {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 500;
}

.history-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
}

.history-meta {
  font-size: 11px;
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  gap: 8px;
  align-items: center;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

</style>

<script>
// ========== SUPABASE 雲端連線 ==========
const SUPABASE_URL = 'https://htsmeyvqcpcwdtpszpve.supabase.co';
const SUPABASE_KEY = 'sb_publishable__c2PdqONSUkS-pJTrDYJhg_PMoD4vQZ';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ========== DATA (從雲端讀取) ==========
const today = new Date();
let orders = [];

const statusMap = {
  'pending-setup': { label: '等待搭設', cls: 'status-pending-setup' },
  'in-setup': { label: '搭設中', cls: 'status-in-setup' },
  'pending-teardown': { label: '待拆除', cls: 'status-pending-teardown' },
  'done': { label: '已完成', cls: 'status-done' }
};

// 從雲端載入派工資料
async function loadOrdersFromCloud() {
  try {
    console.log('📡 載入派工訂單...');

    // 讀取所有派給 worker 的 dispatches，join quotes 和 quote_items
    const { data: dispatches, error: dErr } = await db
      .from('dispatches')
      .select('*, quotes(*)')
      .eq('worker_username', 'worker')
      .order('created_at', { ascending: false });

    if (dErr) throw dErr;

    if (!dispatches || dispatches.length === 0) {
      console.log('📋 目前沒有派工訂單');
      orders = [];
      return true;
    }

    // 讀取每張報價單的品項
    const quoteIds = dispatches.map(d => d.quote_id).filter(Boolean);
    let itemsMap = {};

    if (quoteIds.length > 0) {
      const { data: allItems, error: iErr } = await db
        .from('quote_items')
        .select('*')
        .in('quote_id', quoteIds);

      if (!iErr && allItems) {
        allItems.forEach(item => {
          if (!itemsMap[item.quote_id]) itemsMap[item.quote_id] = [];
          itemsMap[item.quote_id].push(item);
        });
      }
    }

    // 組成員工版 orders 格式
    orders = dispatches.map(d => {
      const q = d.quotes || {};
      const qItems = itemsMap[d.quote_id] || [];

      // 決定員工端的狀態
      let workerStatus = 'pending-setup';
      if (d.status === 'teardown-done' || d.status === 'done') {
        workerStatus = 'done';
      } else if (d.status === 'setup-done' || d.teardown_completed_at) {
        workerStatus = 'done';
      } else if (d.setup_completed_at) {
        workerStatus = 'pending-teardown';
      }

      return {
        id: d.id,
        dispatch_id: d.id,
        quote_id: d.quote_id,
        no: q.quote_no || `ORD-${d.id}`,
        client: q.client_name || '未知客戶',
        contact: q.client_contact || '—',
        phone: q.client_phone || '—',
        address: q.setup_address || '—',
        items: qItems.map(i => ({ name: i.item_name, qty: i.quantity })),
        remark: q.remark || '',
        setupDate: q.setup_date || '—',
        eventDate: q.event_date_start || '—',
        teardownDate: d.teardown_completed_at ? d.teardown_completed_at.slice(0,10) : null,
        status: workerStatus,
        worker_notes: d.worker_notes || '',
        photos: []
      };
    });

    console.log(`✅ 載入 ${orders.length} 筆派工訂單`);
    return true;
  } catch (err) {
    console.error('❌ 載入派工失敗:', err);
    return false;
  }
}

// 搭設完成 — 更新雲端
async function markSetupComplete(dispatchId, teardownDate, notes) {
  try {
    const { error } = await db
      .from('dispatches')
      .update({
        setup_completed_at: new Date().toISOString(),
        worker_notes: notes || '',
        status: 'setup-done',
        updated_at: new Date().toISOString()
      })
      .eq('id', dispatchId);

    if (error) throw error;

    // 也更新 quotes 的狀態
    const order = orders.find(o => String(o.dispatch_id) === String(dispatchId));
    if (order && order.quote_id) {
      await db
        .from('quotes')
        .update({
          status: 'setup-done',
          setup_completed_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq('id', order.quote_id);
    }

    console.log('✅ 搭設完成已同步到雲端');
    return true;
  } catch (err) {
    console.error('❌ 更新搭設狀態失敗:', err);
    alert('同步失敗，請檢查網路');
    return false;
  }
}

// 拆除完成 — 更新雲端
async function markTeardownComplete(dispatchId) {
  try {
    const { error } = await db
      .from('dispatches')
      .update({
        teardown_completed_at: new Date().toISOString(),
        status: 'done',
        updated_at: new Date().toISOString()
      })
      .eq('id', dispatchId);

    if (error) throw error;

    const order = orders.find(o => String(o.dispatch_id) === String(dispatchId));
    if (order && order.quote_id) {
      await db
        .from('quotes')
        .update({
          status: 'unpaid',
          teardown_completed_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq('id', order.quote_id);
    }

    console.log('✅ 拆除完成已同步到雲端');
    return true;
  } catch (err) {
    console.error('❌ 更新拆除狀態失敗:', err);
    alert('同步失敗，請檢查網路');
    return false;
  }
}

document.querySelectorAll('.tab').forEach(t => {

document.getElementById('backBtn').addEventListener('click', () => {
  // figure out which tab to return to based on order status
  const o = orders.find(x => String(x.id) === String(currentDetailId));
  let tab = 'setup';
  if (o) {
    if (o.status === 'pending-teardown') tab = 'teardown';
    else if (o.status === 'done') tab = 'history';
    else tab = 'setup';
  }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
});

// ========== RENDER ==========
function formatDateDiff(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr.replace(/\//g, '-'));
  const diffDays = Math.round((d - today) / 86400000);
  if (diffDays === 0) return { text: '今天', cls: 'today' };
  if (diffDays === 1) return { text: '明天', cls: 'tomorrow' };
  if (diffDays > 1 && diffDays <= 7) return { text: `${diffDays} 天後`, cls: '' };
  if (diffDays < 0) return { text: `${Math.abs(diffDays)} 天前`, cls: '' };
  return { text: dateStr, cls: '' };
}

function renderSetup() {
  const list = document.getElementById('setupList');
  list.innerHTML = '';
  const items = orders.filter(o => o.status === 'pending-setup' || o.status === 'in-setup');

  if (items.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <div class="empty-text">目前沒有要搭的工地</div>
        <div class="empty-sub">Nothing to set up</div>
      </div>`;
    return;
  }

  items.forEach(o => {
    const setupDiff = formatDateDiff(o.setupDate);
    const eventDiff = formatDateDiff(o.eventDate);
    const urgentClass = (setupDiff.text === '今天' || setupDiff.text === '明天') ? 'urgent' : '';

    const card = document.createElement('div');
    card.className = `order-card ${urgentClass}`;
    card.innerHTML = `
      <div class="order-card-top">
        <div class="order-card-client">${o.client}</div>
        <div class="order-card-status ${statusMap[o.status].cls}">${statusMap[o.status].label}</div>
      </div>
      <div class="order-card-info">
        <div class="info-row">
          <span class="info-icon">◉</span>
          <div class="info-text"><span class="label">地址</span>${o.address}</div>
        </div>
        <div class="info-row">
          <span class="info-icon">☎</span>
          <div class="info-text"><span class="label">聯絡</span>${o.contact} · <a href="tel:${o.phone}" class="phone-link" onclick="event.stopPropagation()">${o.phone}</a></div>
        </div>
        <div class="info-row">
          <span class="info-icon">▤</span>
          <div class="info-text"><span class="label">品項</span>${o.items.map(i => `${i.name} ×${i.qty}`).join('、')}</div>
        </div>
      </div>
      <div class="order-card-dates">
        <div class="date-chunk">
          <div class="date-chunk-label">搭設日期</div>
          <div class="date-chunk-value ${setupDiff.cls}">${o.setupDate.substring(5)} · ${setupDiff.text}</div>
        </div>
        <div class="date-chunk">
          <div class="date-chunk-label">活動日期</div>
          <div class="date-chunk-value ${eventDiff.cls}">${o.eventDate.substring(5)} · ${eventDiff.text}</div>
        </div>
      </div>
      <div class="order-card-actions">
        <button class="action-btn action-btn-sec">查看詳細</button>
      </div>
    `;
    card.addEventListener('click', () => showDetail(o.id));
    list.appendChild(card);
  });
}

          <div class="info-text"><span class="label">地址</span>${o.address}</div>
        </div>
        <div class="info-row">
          <span class="info-icon">☎</span>
          <div class="info-text"><span class="label">聯絡</span>${o.contact} · <a href="tel:${o.phone}" class="phone-link" onclick="event.stopPropagation()">${o.phone}</a></div>
        </div>
        <div class="info-row">
          <span class="info-icon">▤</span>

// ========== DETAIL VIEW ==========
let currentDetailId = null;

function showDetail(id) {
  const o = orders.find(x => String(x.id) === String(id));
  if (!o) return;
  currentDetailId = id;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');

  const s = statusMap[o.status];

  // 品項可調整（員工到現場後客戶改數量）
  const canEdit = (o.status === 'pending-setup' || o.status === 'in-setup' || o.status === 'pending-teardown');

  const itemsHTML = o.items.map((i, idx) => `
    <div class="item-line" style="display:flex;align-items:center;gap:8px;">
      <span class="item-line-name" style="flex:1;">${i.name}</span>
      ${canEdit ? `
        <button onclick="adjustQty(${o.id}, ${idx}, -1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--bg-card);font-size:16px;cursor:pointer;">−</button>
        <span class="item-line-qty" style="min-width:32px;text-align:center;font-weight:600;">×${i.qty}</span>
        <button onclick="adjustQty(${o.id}, ${idx}, 1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--bg-card);font-size:16px;cursor:pointer;">+</button>
        <button onclick="removeItem(${o.id}, ${idx})" style="width:28px;height:28px;border-radius:50%;border:1px solid #fde2dc;background:#fff8f5;color:#a3391e;font-size:14px;cursor:pointer;">×</button>
      ` : `
        <span class="item-line-qty">×${i.qty}</span>
      `}
    </div>
  `).join('');

  // 加入「客戶臨時調整」的按鈕（只在尚未完成時顯示）
  const adjustSection = canEdit ? `
    <div style="margin-top:10px;padding-top:10px;border-top:0.5px dashed var(--line);">
      <button onclick="addItemOnSite(${o.id})" style="width:100%;padding:10px;background:var(--worker-light);border:1px dashed var(--worker);border-radius:8px;font-family:inherit;font-size:13px;color:var(--worker);cursor:pointer;">
        + 客戶臨時新增品項
      </button>
    </div>
  ` : '';

  const photosHTML = o.photos.length > 0 ? `
    <div class="photo-grid">
      ${o.photos.map(p => `
        <div class="photo-thumb ${p.label === 'final' ? 'is-final' : ''}" ${p.url ? `onclick="window.open('${p.url}','_blank')"` : ''}>
          ${p.url
            ? `<img src="${p.url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />`
            : `<svg viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="1">
                <path d="M10 70 L50 30 L90 70 Z"/>
                <path d="M50 30 L50 70"/>
                <path d="M10 70 L90 70"/>
              </svg>`
          }
          ${p.label === 'teardown' ? '<div class="photo-thumb-badge">拆</div>' : ''}
          ${p.label === 'final' ? '<div class="photo-thumb-badge" style="background:var(--green)">完工</div>' : ''}
        </div>
      `).join('')}
    </div>
  ` : '<div style="font-size:12px; color:var(--ink-faint); padding:10px 0;">尚未拍攝照片</div>';

  // Main action based on status
  let bigAction = '';
  if (o.status === 'pending-setup' || o.status === 'in-setup') {
    bigAction = `
      <div class="big-action-container">
        <button class="big-action success" onclick="openSetupModal('${o.id}')">
          ✓ 搭設完成
        </button>
        <div class="big-action-hint">按下後請輸入拆除日期</div>

  const setupDiff = formatDateDiff(o.setupDate);
  const eventDiff = formatDateDiff(o.eventDate);
  const teardownDiff = o.teardownDate ? formatDateDiff(o.teardownDate) : null;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div class="detail-client">${o.client}</div>
      <div class="detail-order-no">${o.no}</div>
      <div class="order-card-status ${s.cls}" style="display:inline-block;">${s.label}</div>

        <div class="detail-field">

          <span class="detail-field-value"><a href="tel:${o.phone}">${o.phone}</a></span>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">SCHEDULE · 時程</div>
      <div class="detail-info-grid">
        <div class="detail-field">
          <span class="detail-field-label">搭設</span>

        </div>
        <div class="detail-field">
          <span class="detail-field-label">活動</span>
          <span class="detail-field-value">${o.eventDate} · ${eventDiff.text}</span>

        <div class="detail-field">
          <span class="detail-field-label">拆除</span>
          <span class="detail-field-value">${o.teardownDate} · ${teardownDiff.text}</span>
        </div>` : ''}

    </div>

    <div class="detail-section">

      <div class="item-list">${itemsHTML}</div>
      ${adjustSection}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">NOTES · 老闆備註</div>
      <div class="worker-remark">${o.remark}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">
        <span>PHOTOS · 現場紀錄</span>
        <span style="color: var(--worker); font-weight:600;">${o.photos.length} 張</span>
      </div>
      <div class="photo-upload-area">
        <div class="photo-upload-row">
          <label class="photo-upload-btn final" style="cursor:pointer;flex:1;">
            <span>📷</span> 直接拍照
            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="uploadPhoto(this, '${o.id}', 'final')">
          </label>
          <label class="photo-upload-btn final" style="cursor:pointer;flex:1;">
            <span>🖼</span> 從相簿選
            <input type="file" accept="image/*" style="display:none;" onchange="uploadPhoto(this, '${o.id}', 'final')">
          </label>
        </div>
        ${photosHTML}
        <div class="photo-note-editor">
          <label>NOTES · 施工筆記（可寫怎麼搭、注意事項）</label>
          <textarea placeholder="例：主桿下加壓重沙包、燈串從左上拉到右下、客人要求入口朝南..."></textarea>
        </div>
      </div>
    </div>

    ${bigAction}
  `;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// 真的拍照上傳到 Supabase Storage
async function uploadPhoto(input, orderId, photoType) {

// ========== 品項調整（客戶臨時增減）==========

// 調整數量（+1 或 -1）
async function adjustQty(orderId, itemIdx, delta) {
  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o || !o.items[itemIdx]) return;

  const item = o.items[itemIdx];
  const oldQty = item.qty;
  const newQty = Math.max(0, oldQty + delta);

  if (newQty === 0) {
    removeItem(orderId, itemIdx);
    return;
  }

  item.qty = newQty;

  // 更新雲端 quote_items
  if (o.quote_id) {
    try {
      const { data: qItems } = await db
        .from('quote_items')
        .select('id')
        .eq('quote_id', o.quote_id)
        .order('sort_order');

      if (qItems && qItems[itemIdx]) {
        await db.from('quote_items')
          .update({ quantity: newQty })
          .eq('id', qItems[itemIdx].id);
      }

      // 重算總金額
      await recalcQuoteTotal(o.quote_id);

      console.log(`✅ 品項調整：${item.name} ${oldQty} → ${newQty}`);
    } catch (err) {
      console.error('品項調整失敗:', err);
    }
  }

  showDetail(orderId);
}

// 刪除品項
async function removeItem(orderId, itemIdx) {
  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o || !o.items[itemIdx]) return;

  const item = o.items[itemIdx];
  if (!confirm(`確定移除「${item.name} ×${item.qty}」？\n\n老闆那邊會收到通知。`)) return;

  o.items.splice(itemIdx, 1);

  if (o.quote_id) {
    try {
      const { data: qItems } = await db
        .from('quote_items')
        .select('id')
        .eq('quote_id', o.quote_id)
        .order('sort_order');

      if (qItems && qItems[itemIdx]) {
        await db.from('quote_items').delete().eq('id', qItems[itemIdx].id);
      }

      await recalcQuoteTotal(o.quote_id);
      console.log(`✅ 已移除品項：${item.name}`);
    } catch (err) {
      console.error('刪除品項失敗:', err);
    }
  }

  showDetail(orderId);
}

// 客戶臨時新增品項
async function addItemOnSite(orderId) {
  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o) return;

  const name = prompt('客戶要新增什麼品項？\n\n例如：12尺帳篷、塑膠椅子、電燈');
  if (!name || !name.trim()) return;

  const qtyStr = prompt(`「${name.trim()}」要幾個/張/盞？`, '1');
  if (!qtyStr) return;
  const qty = parseInt(qtyStr) || 1;

  o.items.push({ name: name.trim(), qty: qty });

  if (o.quote_id) {
    try {
      await db.from('quote_items').insert([{
        quote_id: o.quote_id,
        item_name: name.trim(),
        quantity: qty,
        unit_price: 0,
        sort_order: o.items.length - 1
      }]);

      // 在 quotes 表加筆記
      await db.from('quotes').update({
        worker_notes: `[現場調整] 新增 ${name.trim()} ×${qty}`,
        updated_at: new Date().toISOString()
      }).eq('id', o.quote_id);

      console.log(`✅ 新增品項：${name.trim()} ×${qty}`);
    } catch (err) {
      console.error('新增品項失敗:', err);
    }
  }

  alert(`✓ 已新增「${name.trim()} ×${qty}」\n\n老闆那邊會收到更新。`);
  showDetail(orderId);
}

// 重算報價單總金額
async function recalcQuoteTotal(quoteId) {
  try {
    const { data: items } = await db
      .from('quote_items')
      .select('quantity, unit_price')
      .eq('quote_id', quoteId);

    if (items) {
      const total = items.reduce((sum, i) => sum + (i.quantity * i.unit_price), 0);
      await db.from('quotes').update({
        total_amount: total,
        deposit_amount: Math.round(total * 0.3),
        balance_amount: total - Math.round(total * 0.3),
        updated_at: new Date().toISOString()
      }).eq('id', quoteId);
    }
  } catch (err) {
    console.error('重算總金額失敗:', err);
  }
}
  const file = input.files[0];
  if (!file) return;

  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o) return;

  // 顯示上傳中
  const typeLabel = photoType === 'final' ? '搭設完成照' : '過程照片';
  const statusMsg = document.createElement('div');
  statusMsg.style.cssText = 'text-align:center;padding:12px;color:var(--worker);font-size:13px;font-weight:500;';
  statusMsg.textContent = `📤 上傳${typeLabel}中...`;
  input.closest('.photo-upload-area').insertBefore(statusMsg, input.closest('.photo-upload-row').nextSibling);

  try {
    // 壓縮圖片（手機照片很大，壓到 1200px 寬度以內）
    const compressed = await compressImage(file, 1200, 0.8);

    // 產生檔名
    const timestamp = Date.now();
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `orders/${o.quote_id || orderId}/${photoType}_${timestamp}.${ext}`;

    // 上傳到 Supabase Storage
    const { data, error } = await db.storage
      .from('photos')
      .upload(path, compressed, {
        contentType: compressed.type || 'image/jpeg',
        upsert: false
      });

    if (error) throw error;

    // 取得公開網址
    const { data: urlData } = db.storage
      .from('photos')
      .getPublicUrl(path);

    const publicUrl = urlData.publicUrl;

    // 寫入 photos 資料表
    const { error: dbErr } = await db
      .from('photos')
      .insert([{
        quote_id: o.quote_id || null,
        storage_path: path,
        photo_type: photoType,
        notes: '',
        uploaded_by: 'worker'
      }]);

    if (dbErr) console.error('寫入 photos 表失敗:', dbErr);

    // 更新本地資料
    o.photos.push({
      id: 'p' + timestamp,
      label: photoType,
      note: '',
      url: publicUrl
    });

    statusMsg.textContent = `✓ ${typeLabel}已上傳！`;
    statusMsg.style.color = 'var(--green)';
    setTimeout(() => {
      statusMsg.remove();
      showDetail(orderId);
    }, 1000);

    console.log(`✅ 照片已上傳: ${path}`);
  } catch (err) {
    console.error('上傳失敗:', err);
    statusMsg.textContent = `✗ 上傳失敗：${err.message}`;
    statusMsg.style.color = 'var(--alert)';
    setTimeout(() => statusMsg.remove(), 3000);
  }

  // 清空 input（讓同一個按鈕可以再次選擇）
  input.value = '';
}

// 壓縮圖片（避免手機原圖太大佔滿免費空間）
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width;
        let h = img.height;

        if (w > maxWidth) {
          h = Math.round(h * maxWidth / w);
          w = maxWidth;
        }

        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        canvas.toBlob((blob) => {
          resolve(blob);
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ========== SETUP COMPLETE MODAL ==========
let pendingSetupOrderId = null;
let pickedTeardownDate = null;

function openSetupModal(orderId) {
  pendingSetupOrderId = orderId;
  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o) { console.error('找不到訂單:', orderId); return; }

  // Generate quick date options: event date, event+1, event+2
  const eventDate = new Date(o.eventDate.replace(/\//g, '-'));
  const options = [
    { date: new Date(eventDate), label: '活動當天' },
    { date: new Date(eventDate.getTime() + 86400000), label: '活動後一天' },
    { date: new Date(eventDate.getTime() + 86400000 * 2), label: '活動後兩天' }
  ];

  const weekLabels = ['日', '一', '二', '三', '四', '五', '六'];

  const pickerRow = document.getElementById('datePickerRow');
  pickerRow.innerHTML = '';
  options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'date-picker-option' + (idx === 1 ? ' selected' : '');
    const m = opt.date.getMonth() + 1;
    const d = opt.date.getDate();
    const w = weekLabels[opt.date.getDay()];
    btn.innerHTML = `
      <span class="date-picker-option-day">${m}/${d}</span>
      <span class="date-picker-option-week">週${w} · ${opt.label}</span>
    `;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.date-picker-option').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      pickedTeardownDate = `${opt.date.getFullYear()}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
      document.getElementById('customDate').value = '';
    });
    pickerRow.appendChild(btn);
  });

  // default to option 2 (event+1)
  pickedTeardownDate = `${options[1].date.getFullYear()}/${String(options[1].date.getMonth()+1).padStart(2,'0')}/${String(options[1].date.getDate()).padStart(2,'0')}`;

  document.getElementById('customDate').addEventListener('change', (e) => {
    if (e.target.value) {
      document.querySelectorAll('.date-picker-option').forEach(x => x.classList.remove('selected'));
      pickedTeardownDate = e.target.value.replace(/-/g, '/');
    }
  });

  document.getElementById('setupCompleteModal').classList.add('visible');
}

function closeSetupModal() {
  document.getElementById('setupCompleteModal').classList.remove('visible');
}

document.getElementById('confirmSetupBtn').addEventListener('click', async () => {
  const o = orders.find(x => String(x.id) === String(pendingSetupOrderId));
  if (!o || !pickedTeardownDate) return;

  document.getElementById('confirmSetupBtn').disabled = true;
  document.getElementById('confirmSetupBtn').textContent = '同步中...';

  const notes = document.getElementById('setupNotes') ? document.getElementById('setupNotes').value : '';
  const ok = await markSetupComplete(o.dispatch_id, pickedTeardownDate, notes);

  if (ok) {
    o.status = 'pending-teardown';
    o.teardownDate = pickedTeardownDate;
    closeSetupModal();
    alert(`✓ 搭設完成！\n\n拆除日期：${pickedTeardownDate}\n已同步到雲端，老闆已收到通知。`);
    renderAll();
    showDetail(pendingSetupOrderId);
  }

  document.getElementById('confirmSetupBtn').disabled = false;
  document.getElementById('confirmSetupBtn').textContent = '確認完成';
});

// ========== TEARDOWN DONE MODAL ==========
let pendingTeardownId = null;

function openTeardownModal(orderId) {
  pendingTeardownId = orderId;
  const o = orders.find(x => String(x.id) === String(orderId));
  if (!o) return;
  document.getElementById('teardownClientName').textContent = `${o.client} · 器材已撤場`;
  document.getElementById('teardownDoneModal').classList.add('visible');
}

function closeTeardownModal() {
  document.getElementById('teardownDoneModal').classList.remove('visible');
}

document.getElementById('confirmTeardownBtn').addEventListener('click', async () => {
  const o = orders.find(x => String(x.id) === String(pendingTeardownId));
  if (!o) return;

  document.getElementById('confirmTeardownBtn').disabled = true;
  document.getElementById('confirmTeardownBtn').textContent = '同步中...';

  const ok = await markTeardownComplete(o.dispatch_id);

  if (ok) {
    o.status = 'done';
    closeTeardownModal();
    alert(`✓ 已拆除完成！\n\n${o.client} 訂單已歸檔\n老闆那邊會自動更新為「未收款」。`);
    renderAll();
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="history"]').classList.add('active');
    document.getElementById('page-history').classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  document.getElementById('confirmTeardownBtn').disabled = false;
  document.getElementById('confirmTeardownBtn').textContent = '確認完成';
});

// ========== INIT ==========
function updateCounts() {
  document.getElementById('countSetup').textContent = orders.filter(o => o.status === 'pending-setup' || o.status === 'in-setup').length;
  document.getElementById('countTeardown').textContent = orders.filter(o => o.status === 'pending-teardown').length;
  document.getElementById('countHistory').textContent = orders.filter(o => o.status === 'done').length;
}

function renderAll() {
  updateCounts();
  renderSetup();
  renderTeardown();
  renderHistory();
}

// 雲端初始化
async function init() {
  console.log('🚀 員工版啟動中...');
  const ok = await loadOrdersFromCloud();
  if (ok) {
    renderAll();
    console.log('🎉 員工版載入完成！');
  } else {
    console.log('⚠️ 雲端連線失敗，顯示空白頁面');
    renderAll();
  }
}

init();

// click outside modal to close
document.getElementById('setupCompleteModal').addEventListener('click', (e) => {
  if (e.target.id === 'setupCompleteModal') closeSetupModal();
});
document.getElementById('teardownDoneModal').addEventListener('click', (e) => {
  if (e.target.id === 'teardownDoneModal') closeTeardownModal();
});

</script>
